let activeF='all';
const done=loadChecks('dsa-done');

function totalQ(){return DSA.reduce((a,s)=>a+s.concepts.reduce((b,c)=>b+c.qs.length,0),0)}
function agodaQ(){return DSA.reduce((a,s)=>a+s.concepts.reduce((b,c)=>b+c.qs.filter(q=>q.ag).length,0),0)}
function qId(sid,ci,qi){return sid+'-'+ci+'-'+qi}

function updateStats(){
  const total=totalQ(),d=done.size;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-agoda').textContent=agodaQ();
  document.getElementById('st-done').textContent=d;
  document.getElementById('st-rem').textContent=total-d;
  const pct=total?Math.round(d/total*100):0;
  document.getElementById('sb-fill').style.width=pct+'%';
  document.getElementById('sb-pct').textContent=pct+'%';
}

function tgl(id){
  const store=toggleCheck(id,'dsa-done');
  done.clear();store.forEach(x=>done.add(x));
  updateStats();
}

function buildSidebar(){
  document.getElementById('sidebar-links').innerHTML=DSA.map(s=>
    `<div class="sidebar-item" onclick="document.getElementById('sec-${s.id}').scrollIntoView({behavior:'smooth'})">${s.icon} ${s.title.replace(/^\d+\.\s*/,'')}</div>`
  ).join('');
}

function buildFilters(){
  document.getElementById('filter-row').innerHTML=FILTERS.map(f=>
    `<button class="filter-btn${f.k===activeF?' on':''}" onclick="setF('${f.k}',this)">${f.l}</button>`
  ).join('');
}

function setF(k,btn){
  activeF=k;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();
}

function phClass(ph){return['','ph1','ph2','ph3','ph4'][ph]||'ph1'}

function render(){
  const srch=document.getElementById('srch').value.toLowerCase();
  const container=document.getElementById('sections');
  container.innerHTML='';let any=false;

  DSA.forEach(sec=>{
    if(activeF!=='all'&&activeF!=='agoda'&&activeF!=='must'&&sec.id!==activeF)return;
    const filtC=sec.concepts.map((c,ci)=>{
      const fqs=c.qs.filter(q=>{
        const fm=activeF==='all'?true:activeF==='agoda'?q.ag:activeF==='must'?q.mu:true;
        const sm=srch===''?true:(q.tx.toLowerCase().includes(srch)||c.t.toLowerCase().includes(srch)||sec.title.toLowerCase().includes(srch));
        return fm&&sm;
      });
      return{...c,qs:fqs,ci};
    }).filter(c=>c.qs.length>0);
    if(!filtC.length)return;any=true;

    const totalS=filtC.reduce((a,c)=>a+c.qs.length,0);
    const agS=filtC.reduce((a,c)=>a+c.qs.filter(q=>q.ag).length,0);
    const el=document.createElement('div');
    el.className='section '+phClass(sec.ph);el.id='sec-'+sec.id;

    el.innerHTML=`
      <div class="sec-header" onclick="toggleSec(this)">
        <div class="sec-icon">${sec.icon}</div>
        <div class="sec-title">${sec.title}</div>
        <span class="sec-meta">${totalS} questions · ${agS} Agoda</span>
        <span class="sec-chevron open">▼</span>
      </div>
      <div class="sec-body open">
        <div class="phase-tag">${sec.phase}</div>
        <div class="sec-summary">${sec.summary}</div>
        ${filtC.map(c=>`
          <div class="content-block">
            <div class="block-title">${c.t} <span style="font-size:10px;color:var(--text3);background:var(--bg4);padding:1px 7px;border-radius:10px;font-weight:500">${c.qs.length}</span></div>
            <div class="block-desc">${c.d}</div>
            <ul class="checklist">
              ${c.qs.map((q,qi)=>{
                const id=qId(sec.id,c.ci,qi);
                const isDone=done.has(id);
                return`<li class="check-item">
                  <div class="chk${isDone?' done':''}" id="chk-${id}" onclick="tgl('${id}')"></div>
                  <div style="flex:1">
                    <div class="check-text${isDone?' done':''}" id="txt-${id}">LC ${q.lc} — ${q.tx}</div>
                    <div class="check-sub">
                      ${q.ag?'<span class="badge b-ag">★ Agoda</span>':''}
                      ${q.mu?'<span class="badge b-mu">must</span>':''}
                      <span class="badge ${q.d==='easy'?'b-e':q.d==='hard'?'b-h':'b-m'}">${q.d}</span>
                      <a href="${lcUrl(q.lc)}" target="_blank" style="font-size:11px;color:var(--text3);background:var(--bg4);padding:1px 8px;border-radius:4px;border:1px solid var(--border);text-decoration:none" onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--text3)'">↗ LeetCode</a>
                    </div>
                  </div>
                </li>`;
              }).join('')}
            </ul>
          </div>`).join('')}
      </div>`;
    container.appendChild(el);
  });

  document.getElementById('no-res').style.display=any?'none':'block';
  updateStats();
}

buildTopNav('dsa');
buildSidebar();
buildFilters();
render();
</script>
</body>
</html>
