<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Prep — DSA & Coding</title>
<style>
:root {
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222536;--bg4:#2a2d3e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e8eaf0;--text2:#9498b0;--text3:#5a5f7a;
  --accent:#6c63ff;--accent2:#a5a0ff;
  --tag:#ff6b4a;--tag-bg:rgba(255,107,74,0.12);
  --must:#ff4d6d;--must-bg:rgba(255,77,109,0.12);
  --easy:#22c55e;--easy-bg:rgba(34,197,94,0.1);
  --med:#a78bfa;--med-bg:rgba(167,139,250,0.1);
  --hard:#f59e0b;--hard-bg:rgba(245,158,11,0.1);
  --green:#10b981;--green-bg:rgba(16,185,129,0.1);
  --blue:#38bdf8;--blue-bg:rgba(56,189,248,0.1);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
.topnav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:50px;position:sticky;top:0;z-index:100;gap:8px}
.nav-brand{font-size:14px;font-weight:700;white-space:nowrap;flex-shrink:0}
.nav-brand span{color:var(--accent2)}
.nav-links{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{padding:6px 10px;border-radius:var(--r);font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.nav-link.active{background:rgba(108,99,255,0.15);color:var(--accent2);font-weight:500}
.countdown{background:var(--tag-bg);border:1px solid rgba(255,107,74,0.3);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--tag);font-weight:600;white-space:nowrap;flex-shrink:0}

/* LAYOUT */
.page{padding:16px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.stat-n{font-size:20px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px}

/* PROGRESS */
.prog-wrap{margin-bottom:16px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.prog-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .3s}

/* SEARCH + FILTERS */
.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;padding:9px 12px 9px 36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.4;width:16px;height:16px;pointer-events:none}
.filters{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2);white-space:nowrap;flex-shrink:0;cursor:pointer;background:transparent}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.legend-i{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}

/* SECTION */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden}
.sec-hd{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.sec-hd:active{background:var(--bg3)}
.sec-icon{width:30px;height:30px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ph1 .sec-icon{background:rgba(108,99,255,0.15)}
.ph2 .sec-icon{background:rgba(16,185,129,0.15)}
.ph3 .sec-icon{background:rgba(245,158,11,0.15)}
.ph4 .sec-icon{background:rgba(255,77,109,0.15)}
.sec-title{font-size:13px;font-weight:600;flex:1;line-height:1.3}
.sec-meta{font-size:10px;color:var(--text3);text-align:right;line-height:1.4}
.chev{font-size:10px;color:var(--text3);margin-left:4px;transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.sec-body{display:none;border-top:1px solid var(--border)}
.sec-body.open{display:block}
.phase-pill{display:inline-block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:10px 14px 4px}
.sec-sum{font-size:12px;color:var(--text2);padding:0 14px 12px;line-height:1.6}

/* CONCEPT BLOCK */
.concept{border-top:1px solid var(--border);padding:14px}

/* CONCEPT TABS */
.con-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:0}
.con-tab{padding:6px 12px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.con-tab.active{color:var(--accent2);border-bottom-color:var(--accent);font-weight:500}
.con-panel{display:none}
.con-panel.active{display:block}

.con-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.con-why{background:var(--bg3);border-left:3px solid var(--accent);padding:10px 12px;border-radius:0 var(--r) var(--r) 0;font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.con-what{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.step-list{list-style:none;margin:8px 0}
.step-item{display:flex;gap:10px;padding:5px 0;font-size:12px;color:var(--text2);line-height:1.5}
.step-num{width:20px;height:20px;min-width:20px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;margin-top:1px}

/* CODE */
pre{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-family:'Fira Code','Cascadia Code',monospace;font-size:11.5px;line-height:1.7;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:8px 0;white-space:pre}
.kw{color:#c084fc}.fn{color:#60a5fa}.str{color:#4ade80}.cm{color:var(--text3);font-style:italic}.nu{color:#fb923c}.cl{color:#f472b6}.op{color:#94a3b8}

/* COMPLEXITY TABLE */
.ctable{width:100%;font-size:11px;border-collapse:collapse;margin:8px 0}
.ctable th{background:var(--bg3);color:var(--text2);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.ctable td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2)}
.ctable tr:last-child td{border-bottom:none}
.ctable .good{color:var(--easy)}
.ctable .ok{color:var(--med)}
.ctable .bad{color:var(--hard)}

/* CALLOUT */
.callout{border-radius:var(--r);padding:10px 12px;margin:8px 0;font-size:12px;line-height:1.6;border-left:3px solid}
.c-info{background:var(--blue-bg);border-color:var(--blue);color:var(--text2)}
.c-warn{background:var(--must-bg);border-color:var(--must);color:var(--text2)}
.c-good{background:var(--green-bg);border-color:var(--green);color:var(--text2)}
.c-company{background:var(--tag-bg);border-color:var(--tag);color:var(--text2)}
.callout strong{color:var(--text)}

/* QUESTIONS */
.q-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px}
.q-list{list-style:none}
.q-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.q-row:last-child{border-bottom:none}
.chk{width:18px;height:18px;min-width:18px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;transition:all .12s}
.chk.done{background:var(--green);border-color:var(--green)}
.chk.done::after{content:"✓";font-size:11px;color:#fff;font-weight:700}
.q-content{flex:1;min-width:0}
.q-text{font-size:13px;color:var(--text);line-height:1.4}
.q-text.done{color:var(--text3);text-decoration:line-through}
.q-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;align-items:center}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.b-tag{background:var(--tag-bg);color:var(--tag);border:1px solid rgba(255,107,74,0.25)}
.b-must{background:var(--must-bg);color:var(--must);border:1px solid rgba(255,77,109,0.25)}
.b-e{background:var(--easy-bg);color:var(--easy)}
.b-m{background:var(--med-bg);color:var(--med)}
.b-h{background:var(--hard-bg);color:var(--hard)}
.lc-link{font-size:11px;color:var(--text3);background:var(--bg4);padding:2px 8px;border-radius:4px;border:1px solid var(--border);white-space:nowrap}
.no-res{text-align:center;padding:2rem;color:var(--text3);font-size:13px}

/* MOBILE FIXES */
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-n{font-size:18px}
  pre{font-size:11px;padding:10px}
}
</style>
</head>

</div>

d-list',207:'course-schedule',209:'minimum-size-subarray-sum',210:'course-schedule-ii',213:'house-robber-ii',215:'kth-largest-element-in-an-array',217:'contains-duplicate',227:'basic-calculator-ii',230:'kth-smallest-element-in-a-bst',232:'implement-queue-using-stacks',235:'lowest-common-ancestor-of-a-binary-search-tree',238:'product-of-array-except-self',239:'sliding-window-maximum',240:'search-a-2d-matrix-ii',242:'valid-anagram',253:'meeting-rooms-ii',271:'encode-and-decode-strings',278:'first-bad-version',286:'walls-and-gates',290:'word-pattern',295:'find-median-from-data-stream',297:'serialize-and-deserialize-binary-tree',300:'longest-increasing-subsequence',303:'range-sum-query-immutable',322:'coin-change',344:'reverse-string',347:'top-k-frequent-elements',349:'intersection-of-two-arrays',373:'find-k-pairs-with-smallest-sums',378:'kth-smallest-element-in-a-sorted-matrix',387:'first-unique-character-in-a-string',394:'decode-string',410:'split-array-largest-sum',416:'partition-equal-subset-sum',417:'pacific-atlantic-water-flow',435:'non-overlapping-intervals',438:'find-all-anagrams-in-a-string',450:'delete-node-in-a-bst',451:'sort-characters-by-frequency',459:'repeated-substring-pattern',460:'lfu-cache',496:'next-greater-element-i',503:'next-greater-element-ii',523:'continuous-subarray-sum',525:'contiguous-array',542:'01-matrix',543:'diameter-of-binary-tree',547:'number-of-provinces',560:'subarray-sum-equals-k',567:'permutation-in-string',621:'task-scheduler',622:'design-circular-queue',637:'average-of-levels-in-binary-tree',643:'maximum-average-subarray-i',647:'palindromic-substrings',662:'maximum-width-of-binary-tree',684:'redundant-connection',692:'top-k-frequent-words',695:'max-area-of-island',700:'search-in-a-binary-search-tree',701:'insert-into-a-binary-search-tree',703:'kth-largest-element-in-a-stream',704:'binary-search',721:'accounts-merge',739:'daily-temperatures',743:'network-delay-time',746:'min-cost-climbing-stairs',767:'reorganize-string',787:'cheape const lcUrl=n=>SLUGS[n]?`https://leetcode.com/problems/${SLUGS[n]}`:`https://leetcode.com/problemset/`;

const DSA = [
  {id:'arrays',ph:1,icon:'▦',title:'Arrays & Sliding Window',phase:'Phase 1 — Foundation',
   summary:'The most tested category. Sliding window converts O(n²) brute force to O(n). Master this pattern before anything else.',
   concepts:[
    {t:'Two Pointer',
     why:'Two pointers let you eliminate half the search space at each step. Instead of checking every pair with nested loops O(n²), you start pointers at both ends and move them inward based on a condition — giving O(n).',
     what:'Place one pointer at the start, one at the end (or both at start for same-direction). Move them toward each other based on whether the current result is too big, too small, or satisfies the condition.',
     steps:['Initialize left=0, right=n-1 (or both at 0 for same direction)','Check condition using both pointers','If too small → move left pointer right','If too large → move right pointer left','Repeat until pointers meet'],
     code:`<span class="cm">// Two Sum II — sorted array</span>
<span class="kw">public int</span>[] <span class="fn">twoSum</span>(<span class="kw">int</span>[] nums, <span class="kw">int</span> target) {
    <span class="kw">int</span> left = <span class="nu">0</span>, right = nums.length - <span class="nu">1</span>;
    <span class="kw">while</span> (left < right) {
        <span class="kw">int</span> sum = nums[left] + nums[right];
        <span class="kw">if</span> (sum == target) <span class="kw">return new int</span>[]{left+<span class="nu">1</span>, right+<span class="nu">1</span>};
        <span class="kw">if</span> (sum < target) left++;  <span class="cm">// need bigger sum</span>
        <span class="kw">else</span> right--;              <span class="cm">// need smaller sum</span>
    }
    <span class="kw">return new int</span>[]{};
}`,

     tip:'Two pointer only works on SORTED arrays (or when you sort first). If unsorted → use HashMap instead.',
     qs:[{tx:'Two Sum II – sorted array',lc:167,d:'easy',tag:true,mu:true},{tx:'Three Sum',lc:15,d:'med',tag:true,mu:true},{tx:'Container With Most Water',lc:11,d:'med',tag:true,mu:true},{tx:'Trapping Rain Water',lc:42,d:'hard',tag:true}]
    },
    {t:'Sliding Window — Variable Size',
     why:'When you need the longest/shortest subarray satisfying a condition, brute force checks all subarrays O(n²). Sliding window maintains a "window" with two pointers — expand right freely, shrink left when constraint breaks. Each element enters and leaves the window at most once → O(n).',
     what:'Right pointer expands the window. When the constraint is violated, left pointer shrinks from the left until constraint is satisfied again. Track the best window seen.',
     steps:['right pointer moves forward one step at a time','Add nums[right] to window state','While window violates constraint: remove nums[left], move left++','Update answer with current window size','Repeat'],
     code:`<span class="cm">// Longest substring without repeating characters</span>
<span class="kw">public int</span> <span class="fn">lengthOfLongestSubstring</span>(String s) {
    Map&lt;Character, Integer&gt; lastSeen = <span class="kw">new</span> HashMap&lt;&gt;();
    <span class="kw">int</span> maxLen = <span class="nu">0</span>, left = <span class="nu">0</span>;

    <span class="kw">for</span> (<span class="kw">int</span> right = <span class="nu">0</span>; right < s.length(); right++) {
        <span class="kw">char</span> c = s.<span class="fn">charAt</span>(right);
        <span class="cm">// If seen and inside current window → shrink</span>
        <span class="kw">if</span> (lastSeen.<span class="fn">containsKey</span>(c) && lastSeen.<span class="fn">get</span>(c) >= left) {
            left = lastSeen.<span class="fn">get</span>(c) + <span class="nu">1</span>;
        }
        lastSeen.<span class="fn">put</span>(c, right);
        maxLen = Math.<span class="fn">max</span>(maxLen, right - left + <span class="nu">1</span>);
    }
    <span class="kw">return</span> maxLen;
}`,
     complexity:[['Longest Substring','O(n)','O(k) k=charset'],['Min Window Substr','O(n)','O(k)'],['Max Consecutive 1s','O(n)','O(1)']],
     tip:'Track what\'s IN the window using a HashMap or array. The window always stays valid — you shrink before you update the answer.',
     qs:[{tx:'Longest Substring Without Repeating Characters',lc:3,d:'med',tag:true,mu:true},{tx:'Minimum Window Substring',lc:76,d:'hard',tag:true},{tx:'Longest Repeating Character Replacement',lc:424,d:'med',tag:true},{tx:'Minimum Size Subarray Sum',lc:209,d:'med',mu:true},{tx:'Max Consecutive Ones III',lc:1004,d:'med'}]
    },
    {t:'Prefix Sums',
     why:'Finding the sum of any subarray naively is O(n). Prefix sums precompute cumulative totals so any range query is O(1): sum(l,r) = prefix[r] - prefix[l-1]. Combined with a HashMap, this solves "find subarray with target sum" in O(n).',
     what:'Build prefix array where prefix[i] = sum of first i elements. Any subarray sum from index l to r = prefix[r] - prefix[l-1]. Store prefix sums seen so far in a HashMap to find complement in O(1).',

     code:`<span class="cm">// Linked list cycle II — find cycle start</span>
<span class="kw">public</span> ListNode <span class="fn">detectCycle</span>(ListNode head) {
    ListNode fast = head, slow = head;

    <span class="cm">// Phase 1: detect meeting point</span>
    <span class="kw">while</span> (fast != <span class="kw">null</span> && fast.next != <span class="kw">null</span>) {
        fast = fast.next.next;
        slow = slow.next;
        <span class="kw">if</span> (fast == slow) <span class="kw">break</span>;
    }
    <span class="kw">if</span> (fast == <span class="kw">null</span> || fast.next == <span class="kw">null</span>) <span class="kw">return null</span>;

    <span class="cm">// Phase 2: find cycle start — reset slow to head</span>
    slow = head;
    <span class="kw">while</span> (slow != fast) {
        slow = slow.next;
        fast = fast.next; <span class="cm">// both move 1 step now</span>
    }
    <span class="kw">return</span> slow; <span class="cm">// cycle start</span>
}`,

     code:`<span class="cm">// Course Schedule — can you finish all courses?</span>
<span class="kw">public boolean</span> <span class="fn">canFinish</span>(<span class="kw">int</span> n, <span class="kw">int</span>[][] prereqs) {

        <span class="kw">if</span> (!<span class="fn">dfs</span>(i, graph, state)) <span class="kw">return false</span>;

<span class="kw">boolean</span> <span class="fn">dfs</span>(<span class="kw">int</span> node, List&lt;List&lt;Integer&gt;&gt; g, <span class="kw">int</span>[] state) {

    <span class="kw">if</span> (state[node]==<span class="nu">2</span>) <span class="kw">return true</span>;  <span class="cm">// already processed</span>

    <span class="kw">return true</span>;

<span class="kw">public int</span> <span class="fn">networkDelayTime</span>(<span class="kw">int</span>[][] times, <span class="kw">int</span> n, <span class="kw">int</span> k) {
    Map&lt;Integer,List&lt;<span class="kw">int</span>[]&gt;&gt; graph = <span class="kw">new</span> HashMap&lt;&gt;();
    <span class="kw">for</span> (<span class="kw">int</span>[] t:times)
        graph.<span class="fn">computeIfAbsent</span>(t[<span class="nu">0</span>],x->new ArrayList&lt;&gt;()).<span class="fn">add</span>(<span class="kw">new int</span>[]{t[<span class="nu">1</span>],t[<span class="nu">2</span>]});

    <span class="kw">int</span>[] dist = <span class="kw">new int</span>[n+<span class="nu">1</span>];
    Arrays.<span class="fn">fill</span>(dist, Integer.MAX_VALUE);
    dist[k] = <span class="nu">0</span>;

    PriorityQueue&lt;<span class="kw">int</span>[]&gt; pq = <span class="kw">new</span> PriorityQueue&lt;&gt;((a,b)->a[<span class="nu">0</span>]-b[<span class="nu">0</span>]);
    pq.<span class="fn">offer</span>(<span class="kw">new int</span>[]{<span class="nu">0</span>,k}); <span class="cm">// cost, node</span>

    <span class="kw">while</span> (!pq.<span class="fn">isEmpty</span>()) {
        <span class="kw">int</span>[] cur = pq.<span class="fn">poll</span>();
        <span class="kw">if</span> (cur[<span class="nu">0</span>] > dist[cur[<span class="nu">1</span>]]) <span class="kw">continue</span>; <span class="cm">// stale entry</span>
        <span class="kw">for</span> (<span class="kw">int</span>[] nb : graph.<span class="fn">getOrDefault</span>(cur[<span class="nu">1</span>], new ArrayList&lt;&gt;())) {
            <span class="kw">int</span> newDist = cur[<span class="nu">0</span>] + nb[<span class="nu">1</span>];
            <span class="kw">if</span> (newDist < dist[nb[<span class="nu">0</span>]]) {
                dist[nb[<span class="nu">0</span>]] = newDist;
                pq.<span class="fn">offer</span>(<span class="kw">new int</span>[]{newDist, nb[<span class="nu">0</span>]});
            }
        }
    }
    <span class="kw">int</span> ans = Arrays.<span class="fn">stream</span>(dist, <span class="nu">1</span>, n+<span class="nu">1</span>).<span class="fn">max</span>().<span class="fn">getAsInt</span>();
    <span class="kw">return</span> ans == Integer.MAX_VALUE ? -<span class="nu">1</span> : ans;
}`,

    dp[<span class="nu">0</span>] = nums[<span class="nu">0</span>];
    dp[<span class="nu">1</span>] = Math.<span class="fn">max</span>(nums[<span class="nu">0</span>], nums[<span class="nu">1</span>]);

    <span class="kw">for</span> (<span class="kw">int</span> i = <span class="nu">2</span>; i < nums.length; i++) {
        <span class="cm">// Either rob house i (skip i-1) or skip house i</span>
        dp[i] = Math.<span class="fn">max</span>(dp[i-<span class="nu">1</span>], dp[i-<span class="nu">2</span>] + nums[i]);
    }
    <span class="kw">return</span> dp[nums.length - <span class="nu">1</span>];
}
<span class="cm">// Space optimization: only need prev2 and prev1, not full array</span>`,
     complexity:[['Climbing Stairs','O(n)','O(1) optimized'],['House Robber','O(n)','O(1) optimized'],['LIS','O(n²) basic / O(n log n) optimized','O(n)']],
     tip:'Most 1D DP can be space-optimized to O(1) by keeping only the last 1-2 values instead of the full array.',
     qs:[{tx:'Climbing Stairs',lc:70,d:'easy',tag:true,mu:true},{tx:'House Robber',lc:198,d:'med',mu:true},{tx:'Longest Increasing Subsequence',lc:300,d:'med',tag:true,mu:true},{tx:'Maximum Subarray (Kadane)',lc:53,d:'med',tag:true,mu:true},{tx:'Jump Game',lc:55,d:'med',mu:true}]
    },
    {t:'2D DP — Grids & Strings',
     why:'When the answer for (i,j) depends on answers for (i-1,j) and (i,j-1), you need a 2D table. Common for: grid paths, string edit distance, longest common subsequence.',
     what:'Build a 2D table where dp[i][j] = answer for subproblem involving first i chars/rows and first j chars/cols. Fill row by row, left to right.',
     steps:['Define dp[i][j]: usually "answer for first i of A and first j of B"','Set base cases: dp[0][j] and dp[i][0] (empty string/row cases)','Fill table row by row','dp[i][j] usually depends on dp[i-1][j], dp[i][j-1], dp[i-1][j-1]','Answer is dp[m][n]'],
     code:`<span class="cm">// Edit Distance — min operations to convert word1 to word2</span>
<span class="kw">public int</span> <span class="fn">minDistance</span>(String w1, String w2) {
    <span class="kw">int</span> m=w1.length(), n=w2.length();
    <span class="kw">int</span>[][] dp = <span class="kw">new int</span>[m+<span class="nu">1</span>][n+<span class="nu">1</span>];

    <span class="cm">// Base cases: convert to/from empty string</span>
    <span class="kw">for</span> (<span class="kw">int</span> i=<span class="nu">0</span>;i<=m;i++) dp[i][<span class="nu">0</span>]=i; <span class="cm">// delete i chars</span>
    <span class="kw">for</span> (<span class="kw">int</span> j=<span class="nu">0</span>;j<=n;j++) dp[<span class="nu">0</span>][j]=j; <span class="cm">// insert j chars</span>

    <span class="kw">for</span> (<span class="kw">int</span> i=<span class="nu">1</span>;i<=m;i++) {
        <span class="kw">for</span> (<span class="kw">int</span> j=<span class="nu">1</span>;j<=n;j++) {
            <span class="kw">if</span> (w1.<span class="fn">charAt</span>(i-<span class="nu">1</span>)==w2.<span class="fn">charAt</span>(j-<span class="nu">1</span>))
                dp[i][j] = dp[i-<span class="nu">1</span>][j-<span class="nu">1</span>]; <span class="cm">// chars match, no op</span>
            <span class="kw">else</span>
                dp[i][j] = <span class="nu">1</span> + Math.<span class="fn">min</span>(dp[i-<span class="nu">1</span>][j-<span class="nu">1</span>],  <span class="cm">// replace</span>
                           Math.<span class="fn">min</span>(dp[i-<span class="nu">1</span>][j],      <span class="cm">// delete</span>
                                    dp[i][j-<span class="nu">1</span>]));    <span class="cm">// insert</span>
        }
    }
    <span class="kw">return</span> dp[m][n];
}`,
     complexity:[['Edit Distance','O(m·n)','O(m·n)'],['LCS','O(m·n)','O(m·n)'],['Coin Change','O(amount·coins)','O(amount)'],['Word Break','O(n²)','O(n)']],
     tip:'Coin Change: dp[i] = min coins to make amount i. dp[0]=0, dp[i]=min(dp[i-coin]+1) for all coins ≤ i. Initialize dp with amount+1 (acts as infinity).',
     qs:[{tx:'Unique Paths',lc:62,d:'med',mu:true},{tx:'Edit Distance',lc:72,d:'hard',tag:true,mu:true},{tx:'Longest Common Subsequence',lc:1143,d:'med',tag:true,mu:true},{tx:'Coin Change',lc:322,d:'med',tag:true,mu:true},{tx:'Word Break',lc:139,d:'med',tag:true,mu:true}]
    }
   ]
  },
  {id:'concurrency',ph:4,icon:'⚙',title:'Concurrency & Java Internals',phase:'Phase 4 — Java Depth',
   summary:'Critical for staff-level platform rounds. Know thread safety, locks, and Java memory model. These are asked verbally and in code review scenarios.',
   concepts:[
    {t:'Thread Safety Fundamentals',
     why:'Multiple threads accessing shared state without synchronization causes race conditions — unpredictable results that are hard to reproduce. Java provides several tools with different trade-offs.',
     what:'Three main tools: volatile (visibility), synchronized (mutual exclusion + visibility), AtomicInteger (lock-free atomic operations). Each solves a different level of the problem.',
     steps:['volatile: guarantees visibility across threads (reads/writes are atomic for primitives, not compound ops)','synchronized: one thread at a time, ensures visibility. Use on methods or code blocks','AtomicInteger: lock-free, uses CPU-level CAS (Compare-And-Swap). Best for counters','ConcurrentHashMap: thread-safe map without locking the whole map (segment-level locking)'],
     code:`<span class="cm">// volatile — visibility only, NOT atomicity</span>
<span class="kw">private volatile boolean</span> running = <span class="kw">true</span>;
<span class="cm">// One thread sets running=false, other thread sees it immediately</span>
<span class="cm">// But: running++ is NOT atomic with volatile</span>

<span class="cm">// synchronized — mutual exclusion + visibility</span>
<span class="kw">public synchronized void</span> <span class="fn">increment</span>() { count++; } <span class="cm">// one thread at a time</span>

<span class="cm">// AtomicInteger — lock-free, best for counters</span>
<span class="kw">private</span> AtomicInteger count = <span class="kw">new</span> AtomicInteger(<span class="nu">0</span>);
count.<span class="fn">incrementAndGet</span>(); <span class="cm">// atomic read-modify-write</span>
count.<span class="fn">compareAndSet</span>(expected, update); <span class="cm">// CAS operation</span>

<span class="cm">// HashMap vs ConcurrentHashMap</span>
Map&lt;K,V&gt; bad = <span class="kw">new</span> HashMap&lt;&gt;();          <span class="cm">// NOT thread-safe</span>
Map&lt;K,V&gt; good = <span class="kw">new</span> ConcurrentHashMap&lt;&gt;(); <span class="cm">// thread-safe</span>`,
     complexity:[['synchronized','O(1) per op','Lock overhead'],['AtomicInteger','O(1) per op','CAS, no lock'],['ConcurrentHashMap','O(1) avg','Segment lock']],
     tip:'volatile does NOT make compound operations atomic. i++ is actually three operations: read, increment, write. Use AtomicInteger for counters, not volatile int.',
     qs:[{tx:'Print in Order',lc:1114,d:'easy',tag:true,mu:true},{tx:'Print FooBar Alternately',lc:1115,d:'med',tag:true,mu:true},{tx:'Print Zero Even Odd',lc:1116,d:'med',tag:true},{tx:'Building H2O',lc:1117,d:'med',tag:true},{tx:'LRU Cache – thread-safe',lc:146,d:'med',tag:true,mu:true},{tx:'Design Bounded Blocking Queue',lc:1188,d:'med',tag:true}]

const FILTERS=[{k:'all',l:'All'},{k:'tag',l:'★ Company'},{k:'must',l:'Must-solve'},{k:'arrays',l:'Arrays'},{k:'hashmap',l:'HashMap'},{k:'stack',l:'Stack'},{k:'linked',l:'Linked List'},{k:'trees',l:'Trees'},{k:'graphs',l:'Graphs'},{k:'binary',l:'Binary Search'},{k:'heap',l:'Heap'},{k:'dp',l:'DP'},{k:'concurrency',l:'Concurrency'}];

let activeF='all';
const done=new Set(JSON.parse(localStorage.getItem('dsa-done')||'[]'));

function save(){localStorage.setItem('dsa-done',JSON.stringify([...done]))}
function totalQ(){return DSA.reduce((a,s)=>a+s.concepts.reduce((b,c)=>b+c.qs.length,0),0)}
function tagQ(){return DSA.reduce((a,s)=>a+s.concepts.reduce((b,c)=>b+c.qs.filter(q=>q.tag).length,0),0)}

function updateStats(){
  const total=totalQ(),d=done.size;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-tag').textContent=tagQ();
  document.getElementById('st-done').textContent=d;
  document.getElementById('st-rem').textContent=total-d;
  const pct=total?Math.round(d/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function toggleDone(id){
  if(done.has(id))done.delete(id);else done.add(id);
  save();
  const chk=document.getElementById('chk-'+id);
  const txt=document.getElementById('txt-'+id);
  if(chk)chk.classList.toggle('done',done.has(id));
  if(txt)txt.classList.toggle('done',done.has(id));
  updateStats();
}

function buildFilters(){
  document.getElementById('filters').innerHTML=FILTERS.map(f=>
    `<span class="fbtn${f.k===activeF?' on':''}" onclick="setF('${f.k}',this)">${f.l}</span>`
  ).join('');
}

function setF(k,el){
  activeF=k;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}

function switchTab(secId,ci,tab){
  const base=`tab-${secId}-${ci}`;
  document.querySelectorAll(`.con-tab[data-base="${base}"]`).forEach(t=>t.classList.remove('active'));
  document.querySelectorAll(`.con-panel[data-base="${base}"]`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`tab-${secId}-${ci}-${tab}`).classList.add('active');
  document.getElementById(`panel-${secId}-${ci}-${tab}`).classList.add('active');
}

function toggleSec(hd){
  const body=hd.nextElementSibling;
  const chev=hd.querySelector('.chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function render(){
  const srch=document.getElementById('srch').value.toLowerCase();
  const container=document.getElementById('sections');
  container.innerHTML='';
  let any=false;

  DSA.forEach(sec=>{
    if(activeF!=='all'&&activeF!=='tag'&&activeF!=='must'&&sec.id!==activeF)return;
    const filtC=sec.concepts.map((c,ci)=>{
      const fqs=c.qs.filter(q=>{
        const fm=activeF==='all'?true:activeF==='tag'?q.tag:activeF==='must'?q.mu:true;
        const sm=srch===''?true:(q.tx.toLowerCase().includes(srch)||c.t.toLowerCase().includes(srch)||sec.title.toLowerCase().includes(srch));
        return fm&&sm;
      });
      return{...c,qs:fqs,ci};
    }).filter(c=>c.qs.length>0||(srch===''&&activeF==='all'));

    const hasConcepts = filtC.length > 0;
    if(!hasConcepts && srch!=='')return;
    any=true;

    const totalS=filtC.reduce((a,c)=>a+c.qs.length,0);
    const tagS=filtC.reduce((a,c)=>a+c.qs.filter(q=>q.tag).length,0);
    const el=document.createElement('div');
    el.className=`section ph${sec.ph}`;
    el.id='sec-'+sec.id;

    const conceptsHTML=filtC.map((c,ci)=>{
      const base=`tab-${sec.id}-${ci}`;
      const stepsHTML=c.steps?`<ol class="step-list">${c.steps.map((s,i)=>`<li class="step-item"><div class="step-num">${i+1}</div><div>${s}</div></li>`).join('')}</ol>`:'';
      const complexityHTML=c.complexity?`<table class="ctable"><tr><th>Problem</th><th>Time</th><th>Space</th></tr>${c.complexity.map(r=>`<tr><td>${r[0]}</td><td class="ok">${r[1]}</td><td class="good">${r[2]}</td></tr>`).join('')}</table>`:'';
      const qsHTML=c.qs.length?`<div class="q-label">Practice questions</div><ul class="q-list">${c.qs.map((q,qi)=>{
        const id=`${sec.id}-${ci}-${qi}`;
        const isDone=done.has(id);
        return`<li class="q-row"><div class="chk${isDone?' done':''}" id="chk-${id}" onclick="toggleDone('${id}')"></div><div class="q-content"><div class="q-text${isDone?' done':''}" id="txt-${id}">LC ${q.lc} — ${q.tx}</div><div class="q-badges">${q.tag?'<span class="badge b-tag">★ Company</span>':''}${q.mu?'<span class="badge b-must">must</span>':''}<span class="badge ${q.d==='easy'?'b-e':q.d==='hard'?'b-h':'b-m'}">${q.d}</span><a href="${lcUrl(q.lc)}" target="_blank" class="lc-link">↗ LeetCode</a></div></div></li>`;
      }).join('')}</ul>`:'';

      return`<div class="concept">
        <div class="con-title">${c.t}</div>
        <div class="con-tabs">
          <div class="con-tab active" id="tab-${base}-why" data-base="${base}" onclick="switchTab('${sec.id}',${ci},'why')">Why it works</div>
          <div class="con-tab" id="tab-${base}-how" data-base="${base}" onclick="switchTab('${sec.id}',${ci},'how')">How to solve</div>
          <div class="con-tab" id="tab-${base}-code" data-base="${base}" onclick="switchTab('${sec.id}',${ci},'code')">Code</div>
          <div class="con-tab" id="tab-${base}-qs" data-base="${base}" onclick="switchTab('${sec.id}',${ci},'qs')">Questions (${c.qs.length})</div>
        </div>
        <div class="con-panel active" id="panel-${base}-why" data-base="${base}">
          <div class="con-why">${c.why}</div>
          ${c.tip?`<div class="callout c-info"><strong>Key insight:</strong> ${c.tip}</div>`:''}
        </div>
        <div class="con-panel" id="panel-${base}-how" data-base="${base}">
          <div class="con-what">${c.what}</div>
          ${stepsHTML}
          ${complexityHTML}
        </div>
        <div class="con-panel" id="panel-${base}-code" data-base="${base}">
          <pre>${c.code}</pre>
        </div>
        <div class="con-panel" id="panel-${base}-qs" data-base="${base}">
          ${qsHTML}
        </div>
      </div>`;
    }).join('');

    el.innerHTML=`
      <div class="sec-hd" onclick="toggleSec(this)">
        <div class="sec-icon">${sec.icon}</div>
        <div>
          <div class="sec-title">${sec.title}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px">${sec.phase}</div>
        </div>
        <div class="sec-meta">${totalS} q · ${tagS} ★<br>${sec.concepts.length} concepts</div>
        <span class="chev open">▼</span>
      </div>
      <div class="sec-body open">
        <div class="sec-sum">${sec.summary}</div>
        ${conceptsHTML}
      </div>`;
    container.appendChild(el);
  });

  document.getElementById('no-res').style.display=any?'none':'block';
  updateStats();
}

// Countdown
function updateCd(){
  const target=new Date('2026-07-09T09:00:00');
  const diff=target-new Date();
  const el=document.getElementById('cd');
  if(!el)return;
  if(diff<=0){el.textContent='Interview day!';return;}
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5);
  el.textContent=`${d}d ${h}h left`;
}
updateCd();setInterval(updateCd,60000);

buildFilters();
render();
</script>
</body>
</html>
